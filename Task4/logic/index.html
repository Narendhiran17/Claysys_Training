<body>
    <h1>Logical Checker</h1>

    <div class="ctnr">

        <div id="palindrome" class="section">
            <h2>Palindrome checker</h2>
            <input type="text" id="pi" placeholder="Enter text">
            <button onclick="checkPalindrome()">Check</button>
            <p id="pr"></p>
        </div>

         <div id="palindrome" class="section">
            <h2>Armstrong Number checker</h2>
            <input type="number" id="ai" placeholder="Enter number">
            <button onclick="checkArmstrong()">Check</button>
            <p id="ar"></p>
        </div>

         <div id="palindrome" class="section">
            <h2>Greatest of 4 Numbers</h2>
            <input type="number" id="n1" placeholder="Number1">
            <input type="number" id="n2" placeholder="Numvber2">
            <input type="number" id="n3" placeholder="Number3">
            <input type="number" id="n4" placeholder="Number4">
            <button onclick="findGreatest()">Find</button>
            <p id="gr"></p>
        </div>
    </div>

    <script src="script.js"></script>
